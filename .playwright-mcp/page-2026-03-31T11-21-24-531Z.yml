  - generic [ref=e1478]:
    - heading "Design-Stuhl – so finden Sie die passenden Stühle für Ihr Zuhause" [level=2] [ref=e1479]
    - paragraph [ref=e1480]:
      - text: "1."
      - link "Stuhlarten" [ref=e1481] [cursor=pointer]:
        - /url: "#kapitel_1"
      - text: "2."
      - link "Stühle am Tisch platzieren" [ref=e1482] [cursor=pointer]:
        - /url: "#kapitel_2"
      - text: "3."
      - link "Multifunktional" [ref=e1483] [cursor=pointer]:
        - /url: "#kapitel_3"
      - text: "4."
      - link "Materialien" [ref=e1484] [cursor=pointer]:
        - /url: "#kapitel_4"
      - text: "5."
      - link "Die optimalen Maße" [ref=e1485] [cursor=pointer]:
        - /url: "#kapitel_5"
      - text: "6."
      - link "Fazit" [ref=e1486] [cursor=pointer]:
        - /url: "#kapitel_6"
    - paragraph
    - heading "1. Stuhlarten – verschiedene Untergestelle und ihre Eigenschaften" [level=2] [ref=e1487]
    - paragraph [ref=e1488]:
      - text: Designer-Stühle gibt es mit verschiedenen Untergestellarten, zwischen denen Sie je nach Geschmack wählen können. Einige bringen dabei einen Mehrwert mit, der auch über den Stil und das persönliche Empfinden hinaus erwähnenswert ist. So sind Vierbein und Kufenstühle oft stapelbar,
      - link "Freischwinger" [ref=e1489] [cursor=pointer]:
        - /url: https://www.connox.de/kategorien/moebel/sitzmoebel/freischwinger.html
      - text: – wie der Name schon sagt – lassen schwingende Bewegungen zu, die den Sitzkomfort erheblich verbessern und drehbare Untergestelle bieten die Möglichkeit, sich anderen am Tisch leichter zuzuwenden.
    - img "PUK Stühle" [ref=e1491]
    - generic [ref=e1492]:
      - text: "1."
      - link "Dreibein" [ref=e1493] [cursor=pointer]:
        - /url: https://www.connox.de/kategorien/moebel/sitzmoebel/stuehle.html
      - text: "| 2."
      - link "Vierbein" [ref=e1494] [cursor=pointer]:
        - /url: https://www.connox.de/kategorien/moebel/sitzmoebel/stuehle.html
      - text: "| 3."
      - link "Vierstern" [ref=e1495] [cursor=pointer]:
        - /url: https://www.connox.de/kategorien/moebel/sitzmoebel/stuehle.html
      - text: "| 4."
      - link "Freischwinger" [ref=e1496] [cursor=pointer]:
        - /url: https://www.connox.de/kategorien/moebel/sitzmoebel/stuehle.html
      - text: "| 5."
      - link "Drehfuß" [ref=e1497] [cursor=pointer]:
        - /url: https://www.connox.de/kategorien/moebel/sitzmoebel/stuehle.html
      - text: "| 6."
      - link "Kufen" [ref=e1498] [cursor=pointer]:
        - /url: https://www.connox.de/kategorien/moebel/sitzmoebel/stuehle.html
    - paragraph
    - heading "2. Stühle am Tisch platzieren – so funktioniert's" [level=2] [ref=e1499]
    - paragraph [ref=e1500]:
      - text: Die Maße des Stuhls spielen eine zentrale Rolle, wenn es um die Platzierung am
      - link "Esstisch" [ref=e1501] [cursor=pointer]:
        - /url: https://www.connox.de/kategorien/moebel/tische/esstische.html
      - text: geht. Denn die Höhe zwischen Sitzfläche und Tischunterkante sollte bestenfalls zwischen 25 und 30 cm betragen, damit Sie genügend Beinfreiheit haben.
    - paragraph [ref=e1502]: Bedenken Sie bei der Auswahl der Stühle zudem den Platz des Raumes und des Tisches, an dem sie stehen sollen. Die Faustregel besagt, dass man 60 cm Platz pro Person am Tisch einplanen sollte. Allerdings hängt die Anzahl der Stühle, die Sie am Tisch platzieren, stark vom Untergestell des Tisches im Zusammenspiel mit der Breite der Stühle ab.
    - img "PUK Stühle" [ref=e1504]
    - paragraph [ref=e1505]: Haben Sie nur wenig Platz zur Verfügung, sollten Sie Stühle ohne Armlehne wählen, die komplett unter den Tisch geschoben werden können. Andernfalls können Durchgänge schnell versperrt werden oder Kommoden eventuell nicht mehr richtig geöffnet werden.
    - paragraph [ref=e1506]:
      - link "Einrichtungsexpertin Kerstin Reilemann Profilbild":
        - /url: ""
        - img "Einrichtungsexpertin Kerstin Reilemann Profilbild" [ref=e1507] [cursor=pointer]
      - text: „Mischen Sie verschiedene Stühle! Egal ob verschiedene Modelle und Marken oder Stühle in einer Variante mit und ohne Armlehne – ein Stuhlmix lockert den Look des Raumes auf und kann ganz individuell auf seine Begebenheiten angepasst werden.“ – Kerstin, Einrichtungsexpertin
    - link "Karlas View Homestory - Esszimmer - Carl Hansen, Hay und Vitra" [ref=e1509] [cursor=pointer]:
      - /url: https://www.connox.de/kategorien/moebel/sitzmoebel/stuehle/vitra-eames-fiberglass-chairs-dsr.html
      - img "Karlas View Homestory - Esszimmer - Carl Hansen, Hay und Vitra" [ref=e1510]
    - paragraph
    - heading "3. Multifunktional – flexibel einsetzbare Stühle" [level=2] [ref=e1511]
    - paragraph [ref=e1512]:
      - text: Haben Sie eher wenig Platz im Wohn- und Essbereich oder der
      - link "Küche" [ref=e1513] [cursor=pointer]:
        - /url: https://www.connox.de/kueche.html
      - text: zur Verfügung, laden aber trotzdem gerne Gäste ein, so bieten sich multifunktionale Stühle an. Klappbare oder stapelbare Designer-Stühle nehmen kaum Raum ein, ermöglichen es Ihnen aber dennoch, Ihren Essplatz im Handumdrehen zu erweitern und genügend bequeme Sitzmöglichkeiten zu schaffen.
    - paragraph [ref=e1514]:
      - text: Auch der Statement-Stuhl darf in keinem Zuhause fehlen. Mit seinem ausdrucksstarken Design wirkt er beinahe wie ein Dekorationsobjekt, kann aber trotzdem auch als Sitzgelegenheit oder als praktischer Ablagestuhl im Schlaf- oder
      - link "Wohnzimmer" [ref=e1515] [cursor=pointer]:
        - /url: https://www.connox.de/wohnzimmer.html
      - text: dienen.
    - paragraph [ref=e1516]:
      - text: Viele Designklassiker, wie die Eames Plastic Chairs von
      - link "Vitra" [ref=e1517] [cursor=pointer]:
        - /url: https://www.connox.de/vitra.html
      - text: ", sind sowohl für den Indoor- als auch den"
      - link "Outdoor" [ref=e1518] [cursor=pointer]:
        - /url: https://www.connox.de/kategorien/outdoor.html
      - text: "-Bereich geeignet. Solche multifunktionalen Stühle können Sie je nach Bedarf umstellen – von der Terrasse ins"
      - link "Esszimmer" [ref=e1519] [cursor=pointer]:
        - /url: https://www.connox.de/esszimmer.html
      - text: und umgekehrt!
    - img "PUK Stühle" [ref=e1521]
    - generic [ref=e1522]:
      - text: "1."
      - link "Klappbarer Stuhl" [ref=e1523] [cursor=pointer]:
        - /url: https://www.connox.de/kategorien/moebel/sitzmoebel/stuehle.html?itm=162167
      - text: "| 2."
      - link "Statement-Stuhl" [ref=e1524] [cursor=pointer]:
        - /url: https://www.connox.de/kategorien/moebel/sitzmoebel/stuehle.html?itm=109984
      - text: "| 3."
      - link "Indoor-Outdoor-Stuhl" [ref=e1525] [cursor=pointer]:
